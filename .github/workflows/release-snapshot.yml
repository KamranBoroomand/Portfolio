name: Release Snapshot

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build effects bundle
        run: npm run build

      - name: Upload production snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-site-${{ github.sha }}
          include-hidden-files: true
          path: |
            .nojekyll
            .well-known
            index.html
            404.html
            security
            projects
            assets
            robots.txt
            sitemap.xml
            CNAME
          retention-days: 90

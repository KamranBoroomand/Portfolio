name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PW_USE_SYSTEM_CHROME: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build effects bundle
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Performance budget check
        run: npm run perf:check

      - name: Repository hygiene check
        run: npm run test:hygiene

      - name: Asset reference check
        run: npm run test:assets

      - name: Security posture check
        run: npm run test:security

      - name: SEO posture check
        run: npm run test:seo

      - name: Internal link check
        run: npm run test:links

      - name: Diagnose system browser
        run: google-chrome --version || chromium-browser --version || chromium --version

      - name: Run e2e smoke tests
        run: npm run test:e2e

      - name: Run accessibility tests
        run: npm run test:a11y

  extended-quality:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build effects bundle
        run: npm run build

      - name: Configure Playwright browser cache path
        run: echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/.cache/ms-playwright" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-all-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-all-
            ${{ runner.os }}-ms-playwright-

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install chromium firefox webkit

      - name: Run extended browser suite
        run: npm run quality:extended

  lighthouse:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build effects bundle
        run: npm run build

      - name: Run Lighthouse assertions
        run: npm run test:lighthouse

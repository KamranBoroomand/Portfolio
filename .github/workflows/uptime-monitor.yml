name: Uptime Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: uptime-monitor
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run uptime checks
        id: uptime
        continue-on-error: true
        run: |
          set +e
          node scripts/monitor-uptime.mjs 2>&1 | tee uptime-monitor.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Open or update alert issue
        if: steps.uptime.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const log = fs.existsSync('uptime-monitor.log')
              ? fs.readFileSync('uptime-monitor.log', 'utf8')
              : 'uptime-monitor.log was not found';
            const failedChecks = Array.from(
              new Set(log.match(/^FAIL\s+([^\s]+)/gm)?.map((line) => line.split(/\s+/)[1]) || [])
            );
            const diagnostics = log.includes('--- UPTIME FAILURES ---')
              ? log.slice(log.indexOf('--- UPTIME FAILURES ---'))
              : log;
            const truncatedDiagnostics = diagnostics.length > 8000
              ? `${diagnostics.slice(-8000)}\n[truncated to last 8000 characters]`
              : diagnostics;
            const title = 'Uptime Alert: kamranboroomand.ir is unreachable';
            const marker = '<!-- uptime-alert-monitor -->';
            const body = [
              marker,
              'Automated uptime monitor detected a failure.',
              '',
              `Time: ${new Date().toISOString()}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Failed checks: ${failedChecks.length ? failedChecks.join(', ') : 'unknown'}`,
              '',
              'Diagnostics:',
              '```text',
              truncatedDiagnostics,
              '```',
              '',
              'This issue will be auto-closed when checks recover.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert'
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['uptime-alert']
              });
            }

      - name: Close alert issue on recovery
        if: steps.uptime.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Uptime Alert: kamranboroomand.ir is unreachable';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert'
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Recovered at ${new Date().toISOString()} in run https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });

      - name: Fail workflow when checks fail
        if: steps.uptime.outcome == 'failure'
        run: exit 1

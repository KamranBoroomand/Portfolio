name: Live Site Verification

# Public-repo-safe post-deploy/live verification. Authoritative uptime
# monitoring should run from Cloudflare or an external synthetic monitor.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: live-site-verification
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run live site verification
        id: live_verification
        continue-on-error: true
        run: |
          set +e
          node scripts/monitor-uptime.mjs 2>&1 | tee live-site-verification.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload live verification report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-site-verification-report
          path: |
            live-site-verification-report.json
            live-site-verification.log
          if-no-files-found: warn
          retention-days: 14

      - name: Open or update verification issue
        if: steps.live_verification.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- live-site-verification-alert -->';
            const label = 'site-verification-alert';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const report = fs.existsSync('live-site-verification-report.json')
              ? JSON.parse(fs.readFileSync('live-site-verification-report.json', 'utf8'))
              : null;
            const log = fs.existsSync('live-site-verification.log')
              ? fs.readFileSync('live-site-verification.log', 'utf8')
              : 'live-site-verification.log was not found';

            const results = report
              ? [...(report.httpResults || []), ...(report.dnsResults || [])]
              : [];
            const failedResults = results.filter((result) => !result.ok);
            const hasCloudflareChallenge = failedResults.some(
              (result) => result.classification === 'CLOUDFLARE_CHALLENGE'
            );
            const title = hasCloudflareChallenge
              ? 'Cloudflare challenged GitHub Actions verifier'
              : 'Live site verification failed';

            function formatResult(result) {
              const diagnostics = result.diagnostics || {};
              return [
                `check=${result.name}`,
                `classification=${result.classification}`,
                `kind=${result.kind}`,
                `url=${diagnostics.url || 'n/a'}`,
                `hostname=${diagnostics.hostname || 'n/a'}`,
                `record-types=${diagnostics.recordTypes ? diagnostics.recordTypes.join(',') : 'n/a'}`,
                `method=${diagnostics.method || 'GET'}`,
                `status=${diagnostics.status ?? 'n/a'}`,
                `final-url=${diagnostics.finalUrl || 'n/a'}`,
                `server=${diagnostics.server || 'none'}`,
                `cf-ray=${diagnostics.cfRay || 'none'}`,
                `location=${diagnostics.location || 'none'}`,
                `content-type=${diagnostics.contentType || 'none'}`,
                `error-code=${diagnostics.errorCode || 'none'}`,
                `error-reason=${diagnostics.errorReason || 'none'}`,
                `error-host=${diagnostics.errorHost || 'none'}`,
                `queries=${Array.isArray(diagnostics.queries) ? diagnostics.queries.map((query) => `${query.recordType}:http=${query.httpStatus ?? 'n/a'},dns=${query.dnsStatus ?? 'n/a'},answers=${query.answerCount ?? 0}`).join('; ') : 'n/a'}`,
                `likely-cause=${result.likelyCause || 'n/a'}`,
                `suggested-next-action=${result.suggestedNextAction || 'n/a'}`,
                diagnostics.bodyExcerpt ? `body-excerpt=${diagnostics.bodyExcerpt}` : null
              ].filter(Boolean).join('\n');
            }

            const diagnostics = failedResults.length
              ? failedResults.map(formatResult).join('\n---\n')
              : log;
            const truncatedDiagnostics = diagnostics.length > 8000
              ? `${diagnostics.slice(-8000)}\n[truncated to last 8000 characters]`
              : diagnostics;
            const body = [
              marker,
              hasCloudflareChallenge
                ? 'Cloudflare challenged the GitHub Actions verifier.'
                : 'Live site verification found one or more failed checks.',
              '',
              'This workflow verifies deployment correctness and live public files. It is not the authoritative uptime monitor.',
              '',
              `Time: ${new Date().toISOString()}`,
              `Run: ${runUrl}`,
              `Failed checks: ${failedResults.length ? failedResults.map((result) => `${result.name} (${result.classification})`).join(', ') : 'unknown'}`,
              '',
              'Diagnostics:',
              '```text',
              truncatedDiagnostics,
              '```',
              '',
              'This issue will be auto-closed when checks recover.'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => {
              if (issue.pull_request) return false;
              const labels = issue.labels.map((item) => typeof item === 'string' ? item : item.name);
              return issue.body?.includes(marker) || labels.includes(label);
            });

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
                labels: [label]
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label]
              });
            }

      - name: Close alert issue on recovery
        if: steps.live_verification.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- live-site-verification-alert -->';
            const label = 'site-verification-alert';
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => {
              if (issue.pull_request) return false;
              const labels = issue.labels.map((item) => typeof item === 'string' ? item : item.name);
              return issue.body?.includes(marker) || labels.includes(label);
            });

            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Live site verification recovered at ${new Date().toISOString()} in run https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });

      - name: Fail workflow when verification fails
        if: steps.live_verification.outcome == 'failure'
        run: exit 1
